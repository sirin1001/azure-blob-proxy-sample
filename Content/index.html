<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>サンプルページ</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #f7f7f7;
			margin: 0;
			padding: 0;
			text-align: center;
		}
		.container {
			margin: 40px auto;
			background: #fff;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.1);
			padding: 32px 24px;
			max-width: 480px;
		}
		img {
			max-width: 100%;
			height: auto;
			border-radius: 4px;
			margin-bottom: 16px;
		}
		h1 {
			color: #333;
		}
		p {
			color: #666;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Azure Blob Proxy サンプルページ</h1>
		<img src="img/image.png" alt="サンプル画像">
		<p>このページは Azure Blob Proxy のサンプルです。<br>下の画像は <code>img/image.png</code> から表示しています。</p>
	</div>
</body>
</html>
